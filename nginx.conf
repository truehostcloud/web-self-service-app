server {
    listen 80;
    server_name localhost;
    
    location = /self-service {
        return 301 $scheme://$http_host$request_uri/;
    }

    location /self-service/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
        include /etc/nginx/mime.types;
    }
} 
