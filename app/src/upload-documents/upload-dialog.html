<md-dialog aria-label="Upload Documents" flex="40">
    <form ng-submit="vm.confirm()">
        <md-toolbar>
            <div class="md-toolbar-tools">
                <h2>Upload Documents</h2>
                <span flex></span>
            </div>
        </md-toolbar>

        <md-dialog-content class="md-padding">
            <md-input-container class="md-block">
                <label>File Name</label>
                <input type="text" ng-model="vm.documentData.name" required>
            </md-input-container>

            <md-input-container class="md-block">
                <label>Description</label>
                <input type="text" ng-model="vm.documentData.description">
            </md-input-container>

            <div layout="row" layout-align="start center">
                <span flex="30">{{vm.documentData.file ? vm.documentData.file.name : 'No file selected'}}</span>
                <md-button class="md-raised">
                    Browse
                    <input type="file" onchange="angular.element(this).scope().vm.handleFileSelect(this)" style="position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%;">
                </md-button>
            </div>
        </md-dialog-content>

        <md-dialog-actions layout="row">
            <span flex></span>
            <md-button ng-click="vm.cancel()" ng-disabled="vm.uploading">Cancel</md-button>
            <md-button type="submit" class="md-raised md-primary" ng-disabled="!vm.documentData.file || vm.uploading">
                <span ng-if="!vm.uploading">Confirm</span>
                <span ng-if="vm.uploading">Uploading...</span>
            </md-button>
        </md-dialog-actions>
    </form>
</md-dialog>
